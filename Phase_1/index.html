<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Social Media Platform • Login</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="auth-wrap">
      <!-- =========== HEADER   ============= -->
      <header>
        <div class="logo-badge" aria-hidden="true">
          <!-- Sync / loop icon -->
          <svg viewBox="0 0 24 24">
             <path d="M20 2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h14l4 4V4c0-1.1-.9-2-2-2z"/>
          </svg>
        </div>

        <h1 class="auth-title">Social Wave</h1>
        <p class="auth-sub">Share. Connect.</p>
      </header>
      <!-- ========== MAIN CONTENT =========== -->
      <main>
        <div class="auth-grid">
          <!-- Login -->
          <section class="card auth-card" id="login">
            <h2>Log In</h2>
            <form>
              <label for="loginUser">Username</label>
              <input class="input" id="loginUser" placeholder="e.g. Arwa" required aria-required="true" />

              <label for="loginPass">Password</label>
              <input
                class="input"
                id="loginPass"
                type="password"
                placeholder="******"
                required aria-required="true"
              />

              <div class="auth-actions">
                <span class="small"
                  >New here? <a href="#signup">Sign up instead.</a></span
                >
                <button class="btn" id="loginBtn" type="submit">Login</button>
                <button class="btn" id="cancelLogin" type="reset">
                  Cancel
                </button>
              </div>
            </form>
          </section>

          <!-- Signup -->
          <section class="card auth-card" id="signup">
            <h2>Sign Up</h2>
            <form>
              <label for="suName">Name</label>
              <input class="input" id="suName" placeholder="ex. Amal" required aria-required="true" />

              <label for="suUser">Username</label>
              <input class="input" id="suUser" placeholder="ex. amal_20" required aria-required="true"/>

              <label for="suPass">Password</label>
              <input
                class="input"
                id="suPass"
                type="password"
                placeholder="12345678"
                required aria-required="true"
              />

              <label for="suConfirm">Confirm Password</label>
              <input
                class="input"
                id="suConfirm"
                type="password"
                placeholder="Confirm password"
                required aria-required="true"
              />
              <label for="suEmail">Email</label>
              <input
                class="input"
                id="suEmail"
                type="email"
                placeholder="example@email.com"
                required aria-required="true"
              />

              <!-- profile picture -->
              <label for="suProfilePic">Profile Picture URL</label>
              <input
                class="input"
                id="suProfilePic"
                type="url"
                placeholder="https://example.com/avatar.jpg"
                required aria-required="true"
              />

              <div class="auth-actions">
                <span class="small"
                  >Already have an account? <a href="#">Log in</a></span
                >
                <button class="btn" id="signupBtn" type="submit">
                  Sign Up
                </button>
                <button class="btn" id="cancelSignUp" type="reset">
                  Cancel
                </button>
              </div>
            </form>
          </section>
        </div>
      </main>
      <!-- ========= FOOTER ====== -->
      <footer>
        <a href="#">About</a>
        <a href="#">Help</a>
        <a href="#">Privacy</a>
      </footer>
    </div>
  </body>
</html>
