<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title> News Feed</title>
    <link rel="stylesheet" href="style.css"/>
  </head>
  <body>
    <!-- Topbar / Header -->
    <header class="topbar">
      <div class="container topbar-inner">
        <div class="brand">
          <span class="mini" aria-hidden="true">
            <svg viewBox="0 0 24 24">
               <path d="M20 2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h14l4 4V4c0-1.1-.9-2-2-2z"/>
            </svg>
          </span>
          <span>Social Wave</span>
        </div>
        <!-- Navigation -->
        <nav class="nav-links">
          <a class="active" href="feed.html">
            <svg viewBox="0 0 24 24">
              <path d="M12 3 3 10v11h6v-7h6v7h6V10l-9-7Z" />
            </svg>
            Home
          </a>
          <a href="users.html">
            <svg viewBox="0 0 24 24">
              <path
                d="M10 2a8 8 0 1 0 4.9 14.3l4.4 4.4 1.4-1.4-4.4-4.4A8 8 0 0 0 10 2Zm0 2a6 6 0 1 1 0 12 6 6 0 0 1 0-12Z"
              />
            </svg>
            Explore
          </a>
          <a href="profile.html">
            <svg viewBox="0 0 24 24">
              <path
                d="M12 12a5 5 0 1 0-5-5 5 5 0 0 0 5 5Zm0 2c-4.4 0-8 2.2-8 5v1h16v-1c0-2.8-3.6-5-8-5Z"
              />
            </svg>
            Profile
          </a>
        </nav>
        <div class="user-pill">
          <span class="avatar" id="topAvatar">U</span>
          <span class="small" id="topUser">@user</span>
          <button class="btn btn-ghost" id="logoutBtn">Logout</button>
        </div>
      </div>
    </header>

    <!-- Main  with Sidebar and Feed -->
    <div class="container app-grid  feed-grid">

      <!-- Main Feed -->
      <main class="card main">
        <div class="page-title">
          <h1>News Feed</h1>
          <!-- Optional hint area : Like no Posts-->
          <div class="right small muted" id="feedHint"></div>
        </div>

        <!-- Post Composer -->
        <div class="card composer">
          <span class="avatar" id="meAvatar">U</span>
          <textarea
            id="postText"
            placeholder="What's happening?"
            rows="3"
          ></textarea>
          <button class="btn" id="postBtn">Post</button>
        </div>

        <!-- Feed Container – posts will be inserted here by JavaScript -->
        <div class="feed" id="feed"></div>
      </main>
    </div>
<script src="js/storage.js"></script>
<script src="js/utils.js"></script>
<script src="js/auth.js"></script>
  </body>
</html>
