<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>SyncSpace • Sign Up</title>
<link rel="stylesheet"  href="style.css"/>
</head>

<body class="page-transition">

 <div class="auth-wrap">
      <!-- =========== HEADER   ============= -->
      <header>
        <div class="logo-badge" aria-hidden="true">
          <!-- Sync / loop icon -->
          <svg viewBox="0 0 24 24">
             <path d="M20 2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h14l4 4V4c0-1.1-.9-2-2-2z"/>
          </svg>
        </div>

        <h1 class="auth-title">Social Wave</h1>
        <p class="auth-sub">Share. Connect.</p>
      </header>
      <!-- ========== MAIN CONTENT =========== -->
      <main>
        <div class="auth-grid">
           <!-- Signup -->
          <section class="card auth-card" id="signup">
            <h2>Sign Up</h2>
            <form>
              <label for="suName">Name</label>
              <input class="input" id="suName" placeholder="ex. Amal" required aria-required="true" />

              <label for="suUser">Username</label>
              <input class="input" id="suUser" placeholder="ex. amal_20" required aria-required="true"/>

              <label for="suPass">Password</label>
              <input
                class="input"
                id="suPass"
                type="password"
                placeholder="12345678"
                required aria-required="true"
              />

              <label for="suConfirm">Confirm Password</label>
              <input
                class="input"
                id="suConfirm"
                type="password"
                placeholder="Confirm password"
                required aria-required="true"
              />
              <label for="suEmail">Email</label>
              <input
                class="input"
                id="suEmail"
                type="email"
                placeholder="example@email.com"
                required aria-required="true"
              />

              <!-- profile picture -->
              <label for="suProfilePic">Profile Picture URL</label>
              <input
                class="input"
                id="suProfilePic"
                type="url"
                placeholder="https://example.com/avatar.jpg"
                required aria-required="true"
              />

              <div class="auth-actions">
                <span class="small"
                  >Already have an account? <a href="/Phase_1/index.html">Log in</a></span
                >
                <button class="btn" id="signupBtn" type="submit">
                  Sign Up
                </button>
                <button class="btn" id="cancelSignUp" type="reset">
                  Cancel
                </button>
              </div>
            </form>
          </section>
        </div>
      </main>
      <!-- ========= FOOTER ====== -->
      <footer>
        <a href="#">About</a>
        <a href="#">Help</a>
        <a href="#">Privacy</a>
      </footer>
    </div>

<script src="js/storage.js"></script>
<script src="js/utils.js"></script>
<script src="js/auth.js"></script>

<script>

const $ = (id)=>document.getElementById(id);

$("signupBtn").onclick = () => {

try{

signup({
name: $("suName").value,
username: $("suUser").value,
password: $("suPass").value,
confirm: $("suConfirm").value
});

window.location.href="feed.html";

}catch(e){
alert(e.message);
}

};

</script>

</body>
</html>
